name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uvx ruff check src tests

      - name: Test (pytest)
        env:
          PYTHONPATH: src
        run: uv run --with pytest --with rank-bm25 python -m pytest tests/ -q
